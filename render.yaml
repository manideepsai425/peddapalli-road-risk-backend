services:
  - type: web
    name: peddapalli-road-risk-api
    runtime: python
    region: singapore          # closest to Telangana
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ALLOWED_ORIGINS
        value: "https://your-app.vercel.app"  # ← update after Vercel deploy
